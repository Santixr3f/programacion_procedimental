</head>

<body>
        <nav class="navbar" role="navigation" aria-label="dropdown navigation">
        <div class="navbar-item has-dropdown is-hoverable">
            <a class="navbar-link">
                Tomas

            <div class="navbar-dropdown">
                <a class="navbar-item" href="../index.html">

                <a class="navbar-item" href="menu.html">
                    Menu

                <a class="navbar-item" href="quienes_somos.html">

                <hr class="navbar-divider">
                <div class="navbar-item">
                    Version 1.0.4
                </div>
            </div>
        </div>

    <div class="box has-background-black" id="contenedor">

        <h1 class="title is-1 has-text-warning">Formulario de inventario</h1>

        <div class="form">
            <form>

                <div class="field has-addons">

                    <p class="control has-addons">
                        <input class="input" type="text" placeholder="Codigo">
                    </p>
                </div>


                <div class="field has-addons">

                    <p class="control has-addons">
                        <input class="input" type="text" placeholder="Nombre del producto">
                    </p>
                </div>


                <div class="field has-addons">
                    <p class="control">
                        <span class="select">
                            <select>
                                <option>Alimento</option>
                                <option>Bebida</option>
                                <option>Postre</option>
                            </select>
                        </span>
                    </p>

                    <p class="control">
                        <input class="input" type="text" placeholder="CATEGORIA">
                    </p>

                </div>

                <div class="field has-addons">

                    <p class="control has-addons">
                        <input class="input" type="number" placeholder="valor unitario">
                    </p>
                </div>

                <div class="field has-addons">

                    <p class="control has-addons">
                        <input class="input" type="text" placeholder="ubicacion">
                    </p>
                </div>

                <div class="field has-addons">

                <div class="field has-addons">

                    <p class="control has-addons">
                        <input class="input" type="number" placeholder="Cantidad">
                    </p>
                </div>

                <div class="field has-addons">

                    <p class="control has-addons">
                        <input class="input" type="text" placeholder="Marca">
                    </p>
                </div>

            </form>
        </div>


        <div class="field is-grouped is-grouped-centered">
            <p class="control">
                <button class="button has-background-warning">
                    Enviar
                </button>
            </p>
            <p class="control">
                <a class="button is-light">
                    Cancelar
                </a>
            </p>
        </div>


    </div>

</body>

</html>
