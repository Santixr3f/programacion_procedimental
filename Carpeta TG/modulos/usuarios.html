<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuarios</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: color(#532929);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.form-container{
    background:#fff;
    width:420px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

.form-container h2{
    text-align:center;
    margin-bottom:25px;
    color:#333;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-weight:bold;
    color: #228b22;;
}

.input-group input,
.input-group select{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:8px;
    outline:none;
    font-size:15px;
    transition:0.3s;
}



.btn{
    width:100%;
    padding:14px;
    border:none;
    background:#b5e28b;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:3s;
}


</style>

</head>

<body>

<div class="form-container">
    <h2>Registro de Usuario</h2>

    <form>

        <div class="input-group">
            <label>Nombre</label>
            <input type="text" placeholder="Ingrese su nombre">
        </div>

        <div class="input-group">
            <label>Apellido</label>
            <input type="text" placeholder="Ingrese su apellido">
        </div>

        <div class="input-group">
            <label>Tipo de Documento</label>
            <select>
                <option>Seleccione</option>
                <option>Cédula de Ciudadanía</option>
                <option>Tarjeta de Identidad</option>
                <option>Pasaporte</option>
                <option>Cédula Extranjera</option>
            </select>
        </div>

        <div class="input-group">
            <label>Número de Documento</label>
            <input type="number" placeholder="Ingrese el número">
        </div>

        <div class="input-group">
            <label>Teléfono</label>
            <input type="tel" placeholder="Ingrese su teléfono">
        </div>

        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" placeholder="Ingrese su correo">
        </div>

        <div class="input-group">
            <label>Género</label>
            <select>
                <option>Seleccione</option>
                <option>Masculino</option>
                <option>Femenino</option>
                <option>Otro</option>
            </select>
        </div>

        <div class="input-group">
            <label>Cargo</label>
            <input type="text" placeholder="Ingrese el cargo">
        </div>

        <div class="input-group">
            <label>Fecha de Nacimiento</label>
            <input type="date">
        </div>

        <div class="input-group">
            <label>Contraseña</label>
            <input type="password" placeholder="Ingrese su contraseña">
        </div>

        <button type="submit" class="btn">Registrar</button>

    </form>
</div>

</body>
</html>
